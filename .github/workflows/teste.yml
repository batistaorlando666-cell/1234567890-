name: Gerar APK Direto

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar o Repositório
      uses: actions/checkout@v4

    - name: Configurar o JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar o Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Dar permissão de execução para o gradlew
      run: chmod +x gradlew

    # Vamos tentar compilar diretamente o APK
    - name: Gerar o APK Debug
      run: ./gradlew assembleDebug

    # Se a linha acima funcionar, este passo vai guardar o seu APK
    - name: Disponibilizar APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
