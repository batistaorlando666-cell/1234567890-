name: Gerar APK com Auto-Correção

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar o Repositório
      uses: actions/checkout@v4

    - name: Configurar o JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar o Gradle
      uses: gradle/actions/setup-gradle@v4

    # PASSO CHAVE: Recria a pasta gradle/wrapper e o arquivo gradle-wrapper.jar ausente
    - name: Recriar o Gradle Wrapper ausente
      run: gradle wrapper --gradle-version 8.13

    - name: Dar permissão de execução para o gradlew
      run: chmod +x gradlew

    # Agora o comando vai rodar sem o erro de "Missing gradle-wrapper.jar"
    - name: Gerar o APK Debug
      run: ./gradlew assembleDebug

    # Salva o arquivo APK para você baixar na aba Actions
    - name: Disponibilizar APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
