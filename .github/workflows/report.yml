name: Workflow 2 - Verificar Wrapper

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  verificar-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Verificar arquivos do wrapper
        shell: bash
        run: |
          REPORT="report-wrapper.txt"
          : > "$REPORT"

          echo "RELATORIO DO WRAPPER" >> "$REPORT"
          echo "====================" >> "$REPORT"
          echo "" >> "$REPORT"

          check_file() {
            local file="$1"
            if [ -f "$file" ]; then
              echo "[OK] $file" >> "$REPORT"
            else
              echo "[FALTA] $file" >> "$REPORT"
            fi
          }

          check_exec() {
            local file="$1"
            if [ -f "$file" ] && [ -x "$file" ]; then
              echo "[OK] executavel: $file" >> "$REPORT"
            elif [ -f "$file" ]; then
              echo "[FALTA PERMISSAO] $file" >> "$REPORT"
            else
              echo "[FALTA] $file" >> "$REPORT"
            fi
          }

          check_file "gradle/wrapper/gradle-wrapper.properties"
          check_file "gradle/wrapper/gradle-wrapper.jar"
          check_exec "gradlew"
          check_file "gradlew.bat"

          echo "" >> "$REPORT"
          echo "CONTEUDO DO gradle-wrapper.properties" >> "$REPORT"
          echo "-------------------------------------" >> "$REPORT"
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            cat gradle/wrapper/gradle-wrapper.properties >> "$REPORT"
          fi

          echo "" >> "$REPORT"
          echo "FIM DO RELATORIO" >> "$REPORT"

          cat "$REPORT"

      - name: Resumo do job
        run: |
          {
            echo "### Verificacao do wrapper concluida"
            echo ""
            echo "- Arquivo de saida: \`report-wrapper.txt\`"
            echo "- O objetivo e confirmar se o Gradle pode rodar no GitHub Actions"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload do relatorio
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-wrapper
          path: report-wrapper.txt
  
