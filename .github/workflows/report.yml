name: Workflow 1 - Verificador

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  verificar-estrutura:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Mostrar pasta raiz
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Nome da pasta: $(basename "$GITHUB_WORKSPACE")"

      - name: Verificar estrutura do projeto
        shell: bash
        run: |
          set +e

          REPORT="report-verificador.txt"
          : > "$REPORT"

          echo "RELATORIO DO PROJETO" >> "$REPORT"
          echo "====================" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "Pasta raiz: $(basename "$GITHUB_WORKSPACE")" >> "$REPORT"
          echo "Caminho: $GITHUB_WORKSPACE" >> "$REPORT"
          echo "" >> "$REPORT"

          check_file() {
            local file="$1"
            if [ -f "$file" ]; then
              echo "[OK] $file" >> "$REPORT"
            else
              echo "[FALTA] $file" >> "$REPORT"
            fi
          }

          check_dir() {
            local dir="$1"
            if [ -d "$dir" ]; then
              echo "[OK] $dir" >> "$REPORT"
            else
              echo "[FALTA] $dir" >> "$REPORT"
            fi
          }

          echo "ARQUIVOS PRINCIPAIS" >> "$REPORT"
          echo "-------------------" >> "$REPORT"
          check_file "settings.gradle.kts"
          check_file "build.gradle.kts"
          check_file "gradle.properties"
          check_dir "gradle/wrapper"
          check_file "gradle/wrapper/gradle-wrapper.properties"
          check_file "gradle/wrapper/gradle-wrapper.jar"
          echo "" >> "$REPORT"

          echo "MODULO APP" >> "$REPORT"
          echo "----------" >> "$REPORT"
          check_dir "app"
          check_file "app/build.gradle.kts"
          check_file "app/src/main/AndroidManifest.xml"
          check_dir "app/src/main/java"
          check_dir "app/src/main/res"
          echo "" >> "$REPORT"

          echo "ARQUIVOS XML COMUNS" >> "$REPORT"
          echo "-------------------" >> "$REPORT"
          find app/src/main/res -type f 2>/dev/null | sort >> "$REPORT"
          echo "" >> "$REPORT"

          echo "ARQUIVOS KOTLIN ENCONTRADOS" >> "$REPORT"
          echo "---------------------------" >> "$REPORT"
          find app/src/main/java -type f -name "*.kt" 2>/dev/null | sort >> "$REPORT"
          echo "" >> "$REPORT"

          echo "ESTRUTURA RESUMIDA" >> "$REPORT"
          echo "------------------" >> "$REPORT"
          find . -maxdepth 3 | sort >> "$REPORT"

          echo "" >> "$REPORT"
          echo "FIM DO RELATORIO" >> "$REPORT"

          cat "$REPORT"

      - name: Resumo do job
        run: |
          {
            echo "### Verificador concluido"
            echo ""
            echo "- Pasta raiz: \`$(basename "$GITHUB_WORKSPACE")\`"
            echo "- Relatorio gerado: \`report-verificador.txt\`"
            echo "- Objetivo: checar estrutura antes do build"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload do relatorio
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-verificador
          path: report-verificador.txt
          
